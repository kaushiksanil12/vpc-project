version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: basic_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build: ./server
    container_name: basic_backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_USER: postgres
      DB_HOST: db
      DB_NAME: postgres
      DB_PASSWORD: password
      DB_PORT: 5432
    depends_on:
      - db

  client:
    build: ./client
    container_name: basic_frontend
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
